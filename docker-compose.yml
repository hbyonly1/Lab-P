services:
  postgres:
    image: postgres:15-alpine
    container_name: lab_p_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lab_p_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lab_p}"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lab_p_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lab_p_redisdata:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lab_p_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/configs:/app/configs:ro

  celery_worker:
    build: ./backend
    container_name: lab_p_celery_worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/configs:/app/configs:ro

  nginx:
    image: nginx:alpine
    container_name: lab_p_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - postgres
      - redis
    restart: unless-stopped

volumes:
  lab_p_pgdata:
  lab_p_redisdata:
