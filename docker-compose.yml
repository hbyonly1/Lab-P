services:
  postgres:
    image: postgres:15-alpine
    container_name: lab_p_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lab_p_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lab_p}"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lab_p_redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - lab_p_redisdata:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: lab_p_backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/configs:/app/configs:ro

  celery_worker:
    build: ./backend
    container_name: lab_p_celery_worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
    env_file:
      - ./.env
    depends_on:
      - backend
      - redis
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-lab_p}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/configs:/app/configs:ro

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: lab_p_nginx
    ports:
      - "127.0.0.1:${PUBLIC_WEB_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  lab_p_pgdata:
  lab_p_redisdata:
