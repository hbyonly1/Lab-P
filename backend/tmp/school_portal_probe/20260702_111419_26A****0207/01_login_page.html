<body>
    
<style type="text/css">
    .inputS
    {
        width: 345px;
        height: 54px;
        -moz-border-radius: 0px;
        -webkit-border-radius: 0px;
        border-radius: 0px;
        border-color: #cecece;
    }

        .inputS:focus
        {
            border-color: #4fd3bd;
            border-width: 3px;
        }

    .loginBut
    {
        width: 29%;
        height: 55px;
        color: White;
        font-family: Microsoft YaHei, '微软雅黑';
        font-size: 25px;
        font-weight: 500;
        -moz-border-radius: 10px;
        -webkit-border-radius: 10px;
        border-radius: 10px;
        background-color: #4fd3bd;
        border: none;
        box-shadow: 3px 3px 6px #CECECE;
    }

        .loginBut:active
        {
            border: none;
        }

    .bgDiv
    {
        width: 1920px;
        height: 1080px;
        background-image: url(../Images/login/登录背景.jpg);

<!--切换用户-->
<div class="modal fade" id="ChangeUserRoleModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title text-center" id="ChangeUserRoleModalLabel">切换用户角色
                </h4>
            </div>
            <div class="modal-body">
                <div id="ChangeRoleContent" class="text-center">
                </div>
            </div>
        </div>
    </div>
</div>
<!--切换用户-->
<input type="hidden" id="loginStatus" style="">
<div class="loginBgImg" style="width: 1920px; height: 1080px;">
    <div class="loginSmallBgImg" style="width: 679px; height: 514px; position: absolute; left: 360px; top: 300px;">
        <div id="loginForm">
            <div class="row" style="padding-top: 50px;">
                <div class="col-md-12 text-center">
                    <span style="font-size: 34px; font-family: Microsoft YaHei,'微软雅黑'; color: #2f68d2; font-weight: 500;">用户登录</span>
                </div>
            </div>
            <div class="row form-group" style="padding-left: 130px; padding-top: 35px; max-height: 99px;">
                <img src="/Images/login/%e7%94%a8%e6%88%b7.png">
                <input type="text" class="form-control inputS" placeholder="请输入用户名" id="userName" name="userName" style="margin-left: 20px;">
            </div>
            <div class="row form-group" style="padding-left: 130px; padding-top: 20px; max-height: 79px;">
                <img src="/Images/login/%e5%af%86%e7%a0%81.png">
                <input type="password" class="form-control inputS" placeholder="请输入密码" id="userPass" name="password" style="margin-left: 25px;" onkeypress="if(event.keyCode==13) {loginClick();}">
            </div>
            <div class="row form-group" style="padding-left: 130px; padding-top: 20px; max-height: 79px;">
                <img src="/Images/login/%e5%af%86%e7%a0%81.png">
                <input type="text" class="form-control inputS" placeholder="请输入验证码" id="checkCode" name="checkCode" style="margin-left: 25px; width: 250px; height: 38px;" maxlength="4" onkeypress="if(event.keyCode==13) {loginClick();}">
                <a href="#">
                    <img id="imgCheckCode" alt="点击刷新" title="点击刷新" src="/CheckCode.ashx?Flag=DengLu" onclick="javascript: this.src = _websiteName+'/CheckCode.ashx?Flag=DengLu&amp;aa=' + Math.random();" width="90" height="38" style="vertical-align: middle;">
                </a>
            </div>
            <div class="row text-center" style="padding-top: 20px;">
                <input type="button" class="loginBut" onclick="loginClick()" value="登&nbsp;录" style="">
            </div>
            <div class="row text-center" style="padding-top: 30px;">
                <span style="font-size: 12px; font-family: Microsoft YaHei,'微软雅黑'; color: #a3aab5;">版权信息：安徽省科大奥锐科技有限公司</span>
            </div>
        </div>
    </div>
    <div style="width: 999px; position: absolute; left: 360px; top: 880px; font-weight: bold;">
